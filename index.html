<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>История Казахстана — Тест + Режим обучения</title>
    <style>
      :root {
        --primary-color: #2c3e50;
        --correct-color: #4caf50;
        --incorrect-color: #f44336;
        --theory-bg: #fef9e4;
        --theory-border: #f0b429;
        --hover-color: #f0f0f0;
        --transition: all 0.3s ease;
      }

      body {
        font-family: "Arial", sans-serif;
        max-width: 950px;
        margin: 0 auto;
        padding: 20px;
        line-height: 1.6;
      }

      .quiz-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 8px;
      }

      .quiz-header h1 {
        font-size: 1.3em;
        color: var(--primary-color);
        margin: 0;
      }

      .mode-switch {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
        justify-content: center;
      }

      .mode-btn {
        padding: 8px 24px;
        font-size: 1rem;
        font-weight: bold;
        border: none;
        border-radius: 40px;
        cursor: pointer;
        background: #e0e0e0;
        transition: var(--transition);
      }

      .mode-btn.active {
        background: var(--primary-color);
        color: white;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      }

      .quiz-counter {
        font-size: 0.9em;
        color: #666;
        white-space: nowrap;
      }

      .score-counter {
        font-size: 0.9em;
        font-weight: 600;
        color: #fff;
        background: var(--primary-color);
        padding: 4px 14px;
        border-radius: 20px;
        white-space: nowrap;
      }

      .score-counter .correct-count { color: #a8f0b8; }

      .progress-bar {
        width: 100%;
        height: 8px;
        background: #eee;
        margin-bottom: 20px;
        border-radius: 4px;
      }

      .progress {
        height: 100%;
        background: var(--primary-color);
        width: 0;
        transition: var(--transition);
        border-radius: 4px;
      }

      .question-block {
        margin-bottom: 20px;
        padding: 20px;
        border: 2px solid #ddd;
        border-radius: 10px;
        background: #fff;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      }

      .question-theme {
        font-size: 0.78em;
        color: #888;
        margin-bottom: 8px;
        font-style: italic;
      }

      .question-text {
        font-size: 1.1em;
        font-weight: 600;
        margin-bottom: 15px;
        color: var(--primary-color);
      }

      .theory-block {
        background: var(--theory-bg);
        border-left: 5px solid var(--theory-border);
        padding: 12px 18px;
        margin-bottom: 20px;
        border-radius: 8px;
        font-size: 0.95em;
        line-height: 1.5;
      }

      .theory-title {
        font-weight: bold;
        margin-bottom: 8px;
        color: #b47c00;
      }

      .answers-container {
        display: grid;
        gap: 10px;
      }

      .answer {
        padding: 12px 15px;
        border: 2px solid #ddd;
        border-radius: 6px;
        cursor: pointer;
        background: #fff;
        text-align: left;
        transition: var(--transition);
        font-size: 1em;
      }

      .answer:hover:not(.disabled) {
        transform: translateX(5px);
        background: var(--hover-color);
      }

      .answer.correct {
        background: var(--correct-color);
        border-color: #388e3c;
        color: white;
      }

      .answer.incorrect {
        background: var(--incorrect-color);
        border-color: #d32f2f;
        color: white;
      }

      .explanation {
        margin-top: 15px;
        padding: 15px;
        background: #e3f2fd;
        border-left: 4px solid #2196f3;
        border-radius: 4px;
        display: none;
        font-size: 0.95em;
      }

      .next-btn {
        display: none;
        margin-top: 16px;
        padding: 11px 30px;
        background: var(--primary-color);
        color: white;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-size: 1em;
        transition: var(--transition);
      }

      .next-btn:hover {
        background: #34495e;
        transform: scale(1.03);
      }

      .results-screen {
        text-align: center;
        padding: 40px;
        background: #f8f9fa;
        border-radius: 10px;
        margin-top: 10px;
      }

      .restart-btn {
        padding: 12px 28px;
        background: var(--primary-color);
        color: white;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-size: 1em;
        transition: var(--transition);
        margin: 6px;
      }

      .restart-btn:hover { transform: scale(1.05); background: #34495e; }

      @media (max-width: 600px) {
        body { padding: 10px; }
        .question-block { padding: 15px; }
        .answer { font-size: 14px; padding: 10px; }
      }
    </style>
  </head>
  <body>

    <div class="quiz-header">

      <button id="modeLearnBtn" class="mode-btn">📚 Режим обучения</button>
    </div>

    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>

    <div id="quiz"></div>

  { "theme": "Казахстан в VI-IX вв. (Караханиды и др.)", "question": "Границы Караханидского государства?", "options": [ "Балхаш–Мавераннахр–Семиречье–Кашгар", "Волга–Алтай–Каспий", "Амударья–Тарим", "Урал–Сырдарья" ], "correctIndex": 0, "explanation": "Караханидское государство охватывало Мавераннахр, Семиречье (Жетысу), Кашгар и доходило до озера Балхаш на севере." },

  { "theme": "Казахстан в VI-IX вв. (Караханиды и др.)", "question": "Цель Мусы хана объявить ислам религией?", "options": [ "Укрепить власть, связи, территории", "Удовлетворить кыпчаков", "Остановить каракитаев", "Восстановить язычество" ], "correctIndex": 0, "explanation": "Объявление ислама государственной религией в 960 г. помогло укрепить центральную власть, наладить связи с мусульманскими странами и расширить территорию." },

  { "theme": "Великий шелковый путь", "question": "Время расцвета экономики, культуры и городской жизни?", "options": [ "X – начало XIII вв.", "VI – VIII вв.", "XIII – XV вв.", "IV – VI вв." ], "correctIndex": 0, "explanation": "Период X — начала XIII вв. (Караханидское государство) — время наибольшего расцвета городов, торговли и культуры вдоль Шелкового пути." },

      let currentQuestion = 0;
      let score = 0;
      let mode = "test"; // "test" или "learn"

      const progressEl = document.getElementById('progress');
      const quizContainer = document.getElementById('quiz');
      const quizCounter = document.getElementById('quiz-counter');
      const totalCountSpan = document.getElementById('total-count');
      const correctCountSpan = document.getElementById('correct-count');

      totalCountSpan.textContent = questions.length;

      function getTheoryForQuestion(q) {
        const theme = q.theme;
        if (theoryDatabase[theme]) {
          return `<div class="theory-block"><div class="theory-title">📖 Теоретический блок (режим обучения)</div>${theoryDatabase[theme]}</div>`;
        } else {
          return `<div class="theory-block"><div class="theory-title">📖 Краткая теория</div>${q.explanation || "Историческая справка отсутствует."}</div>`;
        }
      }

      function renderQuestion(index) {
        const q = questions[index];
        quizCounter.textContent = `Вопрос ${index + 1} из ${questions.length}`;
        progressEl.style.width = `${((index + 1) / questions.length) * 100}%`;

        const block = document.createElement('div');
        block.className = 'question-block';
        
        let innerHtml = `
          ${q.theme ? `<div class="question-theme">${q.theme}</div>` : ''}
          <div class="question-text">${index + 1}. ${q.question}</div>
        `;
        
        if (mode === 'learn') {
          innerHtml += getTheoryForQuestion(q);
        }
        
        innerHtml += `
          <div class="answers-container">
            ${q.options.map((opt, i) => `
              <button class="answer" data-index="${i}">
                ${String.fromCharCode(65 + i)}. ${opt}
              </button>
            `).join('')}
          </div>
          <div class="explanation">${q.explanation}</div>
        `;
        
        block.innerHTML = innerHtml;
        
        const explanationDiv = block.querySelector('.explanation');
        if (mode === 'test') {
          explanationDiv.style.display = 'none';
        } else {
          explanationDiv.style.display = 'block';
        }
        
        block.querySelectorAll('.answer').forEach(btn => {
          btn.addEventListener('click', () =>
            handleAnswer(index, parseInt(btn.dataset.index), block)
          );
        });

        quizContainer.innerHTML = '';
        quizContainer.appendChild(block);

        const nextBtn = document.createElement('button');
        nextBtn.className = 'next-btn';
        nextBtn.id = 'next-btn';
        nextBtn.textContent = index < questions.length - 1 ? 'Следующий вопрос →' : 'Завершить тест';
        nextBtn.addEventListener('click', () => {
          if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            renderQuestion(currentQuestion);
          } else {
            showResults();
          }
        });
        quizContainer.appendChild(nextBtn);
      }

      function handleAnswer(qIndex, aIndex, block) {
        const answers = block.querySelectorAll('.answer');
        const explanation = block.querySelector('.explanation');
        const correctIndex = questions[qIndex].correctIndex;
        const nextBtn = document.getElementById('next-btn');

        if (answers[0].classList.contains('disabled')) return;

        answers.forEach((btn, i) => {
          btn.setAttribute('aria-disabled', 'true');
          btn.classList.add('disabled');
          if (i === correctIndex) btn.classList.add('correct');
          if (i === aIndex && i !== correctIndex) btn.classList.add('incorrect');
        });

        if (aIndex === correctIndex) {
          score++;
          correctCountSpan.textContent = score;
        }
        
        if (mode === 'test') {
          explanation.style.display = 'block';
        }
        if (nextBtn) nextBtn.style.display = 'inline-block';
      }

      function showResults() {
        const pct = Math.round((score / questions.length) * 100);
        progressEl.style.width = '100%';
        quizCounter.textContent = '';
        quizContainer.innerHTML = `
          <div class="results-screen">
            <h2>Тест завершён!</h2>
            <p>Ваш результат: <strong>${score} из ${questions.length}</strong> (${pct}%)</p>
            <button class="restart-btn" onclick="restartQuiz()">🔄 Пройти заново</button>
          </div>
        `;
      }

      function restartQuiz() {
        currentQuestion = 0;
        score = 0;
        correctCountSpan.textContent = '0';
        renderQuestion(0);
      }

      const modeTestBtn = document.getElementById('modeTestBtn');
      const modeLearnBtn = document.getElementById('modeLearnBtn');

      function setMode(newMode) {
        mode = newMode;
        if (mode === 'test') {
          modeTestBtn.classList.add('active');
          modeLearnBtn.classList.remove('active');
        } else {
          modeLearnBtn.classList.add('active');
          modeTestBtn.classList.remove('active');
        }
        renderQuestion(currentQuestion);
      }

      modeTestBtn.addEventListener('click', () => setMode('test'));
      modeLearnBtn.addEventListener('click', () => setMode('learn'));

      renderQuestion(0);
    </script>
